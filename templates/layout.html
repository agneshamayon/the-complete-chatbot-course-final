<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

        <title>Chatbot</title>
        <style>
        html, body {
  height: 100%;
  margin: 0;
}
            body {
  background-image: "images/background.jpg";
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
            #chatbot-container {
              position: fixed;
              bottom: 20px;
              right: 20px;
              font-family: Arial, sans-serif;
            }

            #chatbot-toggle {
              width: 60px;
              height: 60px;
              border-radius: 50%;
              background: #007bff;
              color: white;
              border: none;
              font-size: 24px;
              cursor: pointer;
            }

            #chatbot-window {
              display: none;
              flex-direction: column;
              width: 300px;
              height: 400px;
              background: white;
              border: 1px solid #ddd;
              border-radius: 10px;
              position: absolute;
              bottom: 70px;
              right: 0;
            }

            #chatbot-header {
              background: #007bff;
              color: white;
              padding: 10px;
              border-radius: 10px 10px 0 0;
            }

            #chatbot-messages {
              flex: 1;
              padding: 10px;
              overflow-y: auto;
            }

            #chatbot-input {
              border: none;
              border-top: 1px solid #ddd;
              padding: 10px;
              position: absolute;
            }
            #chatHistory{
                text-align: left;
                width: 100%;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
            }
            //
            .chat-history{
                text-align: left;
                width: 100%;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
            }
            .chat-message {
                width: fit-content;
                width: 100%;
                word-wrap: break-word;
            }
             .chat-message.user-input {
                background-color: #d0eaff; /*light blue*/
                text-align: left;
                border-radius: 5px;
                padding: 5px;
                margin-bottom: 8px;
               }

            .chat-message.ai_response {
                background-color: #f1f1f1; /*light grey*/
                text-align: left;
                border-radius: 5px;
                padding: 5px;
                margin-bottom: 8px;
                /*add*/
                display:flex;
                overflow-y: auto;
                white-space: nowrap;
                word-break: normal;
                overflow-wrap: break-word;
               }
            #footer {
                position: fixed;
                bottom: 3%;
                width: 95%;
                }
        </style>
    </head>

</html>
