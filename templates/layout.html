<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

        <title>Chatbot</title>
        <style>
            h1 {
              text-align: center;
              font-style: italic;
              font-size: 54px;
              color: royalblue;
            }
            h2 {
              text-align: center;
              font-style: italic;
              color:royalblue;
            }
            #chatbot-container {
              position: fixed;
              bottom: 20px;
              right: 100px;
              font-family: Arial, sans-serif;
            }

            #chatbot-toggle {
              width: 60px;
              height: 60px;
              border-radius: 50%;
              /*background: #007bff;*/
              background: royalblue;
              color: white;
              border: none;
              font-size: 24px;
              cursor: pointer;
            }

            #chatbot-window {
              display: none;
              flex-direction: column;
              width: 300px;
              height: 400px;
              background: white;
              border: 1px solid #ddd;
              border-radius: 10px;
              position: absolute;
              bottom: 70px;
              right: 0;
            }

            #chatbot-header {
              /*background: #007bff;*/
              background: royalblue;
              color: white;
              padding: 10px;
              border-radius: 10px 10px 0 0;
            }

            #chatbot-footer {
                margin-top:45px;
            }
            #chatbot-input {
              border: 1px;
              border-top: 1px solid #ddd;
              padding: 10px;
              position: absolute;
              margin-top:10px;
              bottom: 0;
            }

            #chat-history{
                text-align: left;
                width: 100%;
                height:300px;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                padding: 10px;

            }
           .chat-message {
                width: fit-content;
                word-wrap: break-word;
                padding: 5px;
                margin-bottom: 8px;
            }
           .chat-message.user-input {
                background-color: #d0eaff; /*light blue*/
                border-radius: 15px;
                padding: 5px;
                align-self: flex-end; /* coller à droite */
               }
           .chat-message.ai-response {
                background-color: #f1f1f1; /*light grey*/
                border-radius: 15px;
                padding: 5px;
                align-self: flex-start; /* coller à gauche */
               }
            #expandBtn{
                  background:none;
                  border:none;
                  cursor:pointer;
                  padding:6px;
                  color:#555;
                }

                #expandBtn:hover{
                  color:#000;
                }
           body {
                margin:0;
                height:100vh;
                background-image: url("/static/images/background.jpg");
                background-size: cover;
                background-position: center;
                background-position: center;

                /*display: flex;            Flexbox pour centrer */
                justify-content: center; /* centre horizontalement */
                align-items: center; /*     centre verticalement */
                flex-direction: column;  /* pour empiler titre et chat */
            }

        </style>
    </head>
</html>
